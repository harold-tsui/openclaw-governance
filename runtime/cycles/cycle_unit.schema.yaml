# v1.2 → v1.3 核心变更

| 变更类型 | 内容 |
|----------|------|
| 移除 plan.check_reference | 验收策略改为内存 review_context，不持久化 |
| 级别体系对齐 | L0-L5 → L0-L3，引用 pdca-check-protocol v1.2 §3.5 |
| constraints 更新 | 移除对 check_reference 的引用，改为引用 task-card |
| 协议对齐 | 完全对齐 pdca-check-protocol v1.2 |

---

# v1.3 → v1.3-fixed 核心变更

| 问题级别 | 修复内容 |
|----------|----------|
| **[P0] criteria_results comment** | 引用改为"从 task-card §五 读取" |
| **[P0] skip 触发条件** | L5 → L0（免审） |
| **[P1] human_approval_required 规则** | 补充 L0 免审规则 + L3 全量规则 |
| **[P1] fail 降级范围** | L1-L5 → L1-L3（L0 不可降） |
| **[P2] task_card_path 继承** | 从 v1.2 继承，便于直接加载 |
| **[P2] blocked_reason 继承** | 从 v1.2 继承，status=blocked 时记录原因 |
| **[P2] lesson_learn_ref 继承** | 从 v1.2 继承，对应 task-card §十 |
| **级别定义反转修正** | L0=免审，L3=全量（与 task-card §五 对齐） |

