# Business Hours Configuration - 工作时间配置
# 依据：ARCH v1.4.3 §2.1.1 + §4.3
# 创建：2026-04-06

timezone: "Asia/Shanghai"

work_hours:
  start: "09:00"
  end: "18:00"

# 工作日：周一至周五
work_days: [0, 1, 2, 3, 4]  # Python datetime.weekday(): 0=周一, 4=周五

# 法定节假日（2026年）
holidays:
  - "2026-01-01"  # 元旦
  - "2026-01-02"  # 元旦假期
  - "2026-01-03"  # 元旦假期
  - "2026-01-29"  # 春节
  - "2026-01-30"  # 春节
  - "2026-01-31"  # 春节
  - "2026-02-01"  # 春节
  - "2026-02-02"  # 春节
  - "2026-02-03"  # 春节
  - "2026-04-04"  # 清明
  - "2026-04-05"  # 清明
  - "2026-04-06"  # 清明
  - "2026-05-01"  # 劳动节
  - "2026-05-02"  # 劳动节
  - "2026-05-03"  # 劳动节
  - "2026-05-04"  # 青年节
  - "2026-05-05"  # 劳动节假期
  - "2026-06-19"  # 端午
  - "2026-06-20"  # 端午
  - "2026-06-21"  # 端午
  - "2026-10-01"  # 国庆
  - "2026-10-02"  # 国庆
  - "2026-10-03"  # 国庆
  - "2026-10-04"  # 国庆
  - "2026-10-05"  # 国庆
  - "2026-10-06"  # 国庆
  - "2026-10-07"  # 国庆
  - "2026-10-08"  # 国庆

# Heartbeat 配置
heartbeat:
  interval_minutes: 30
  cycles_per_day: 48  # 24小时 * 2
  work_cycles_per_day: 18  # 9小时 * 2